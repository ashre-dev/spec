name: Deploy Registry to Fly.io

on:
  push:
    branches:
      - main
    paths:
      - 'src/registry/**'
      - 'src/__init__.py'
      - 'Dockerfile.registry'
      - 'fly.toml'
      - 'pyproject.toml'
      - 'uv.lock'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-registry

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only --dockerfile Dockerfile.registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
